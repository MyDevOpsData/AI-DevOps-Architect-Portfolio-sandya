apiVersion: apps/v1
kind: Deployment
metadata:
  name: goldstring-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: goldstring
  template:
    metadata:
      labels:
        app: goldstring
    spec:
      containers:
      - name: goldstring-container
        image: <your-ecr-repo>:latest
        ports:
        - containerPort: 80
